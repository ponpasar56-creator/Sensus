<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sensus JATIM | Peta Terintegrasi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            margin: 0; padding: 20px; min-height: 100vh;
        }
        .main-container {
            max-width: 1400px; margin: 0 auto; background: white;
            border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden; padding: 20px;
        }
        h1 { margin: 0 0 5px 0; color: #2c3e50; font-size: 28px; }
        .subtitle { color: #7f8c8d; margin-bottom: 25px; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .button-panel { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s ease; color: white; }
        .btn-primary { background-color: #3498db; }
        .btn-success { background-color: #27ae60; }
        .btn-warning { background-color: #f39c12; }
        .btn-danger { background-color: #e74c3c; }
        .btn-info { background-color: #1abc9c; }
        
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #e0e0e0; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); overflow-y: auto; }
        .modal-content { background-color: white; margin: 30px auto; padding: 25px; border-radius: 16px; width: 90%; max-width: 800px; }
        .modal-scroll-area { max-height: calc(90vh - 100px); overflow-y: auto; padding-right: 5px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        
        .map-modal-container { margin: 10px 0; border-radius: 12px; overflow: hidden; border: 2px solid #3498db; height: 350px; }
        #modalMap { height: 100%; width: 100%; }
        
        .map-control-buttons { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .map-btn { border: none; border-radius: 2rem; padding: 10px 16px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; }
        .btn-focus { background: #3498db; color: white; }
        .btn-sync { background: #2ecc71; color: white; }
        .btn-loc { background: #f1f3f5; color: #495057; }
        
        .layer-switch { display: flex; gap: 5px; margin-left: auto; }
        .layer-btn { background: #2c3e50; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .layer-btn.active { background: #3498db; }
        
        .wa-section { background: #dcf8c6; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #c7e5b2; }
        .coord-info { font-size: 12px; color: #666; margin: 10px 0; padding: 8px; background: #f8f9fa; border-radius: 8px; min-height: 35px; border-left: 4px solid #3498db; }
        .label-text { font-weight: 600; color: #2c3e50; margin-top: 10px; display: block; }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="main-container">
    <h1>🛰️ Sensus Keluarga JATIM</h1>
    <div class="subtitle">Sistem Koordinat & Alamat Terpadu</div>
    
    <div class="button-panel">
        <button class="btn btn-primary" onclick="openAddModal()">➕ Tambah Data</button>
        <button class="btn btn-warning" onclick="exportData()">💾 Export JSON</button>
        <button class="btn btn-success" onclick="importData()">📂 Import JSON</button>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cari nama atau alamat..." onkeyup="quickSearch()">
    </div>
    
    <div class="table-wrapper">
        <table>
            <thead><tr><th>No</th><th>Nama</th><th>Alamat</th><th>Aksi</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Tambah Data</h3>
        <div class="modal-scroll-area">
            
            <div class="wa-section">
                <label class="label-text" style="margin-top:0">🟢 Tempel Lokasi dari WhatsApp:</label>
                <input type="text" id="waInput" placeholder="Tempel pesan lokasi WA atau link Maps di sini..." oninput="handleWALocation()">
            </div>

            <label class="label-text">Nama Lengkap:</label>
            <input type="text" id="inputNama">
            
            <label class="label-text">Alamat Lengkap:</label>
            <textarea id="inputAlamat" rows="2" placeholder="Ketik alamat untuk difokuskan ke peta..."></textarea>
            
            <div class="map-modal-container"><div id="modalMap"></div></div>
            
            <div class="map-control-buttons">
                <button type="button" class="map-btn btn-focus" onclick="focusAddressOnMap()">🔍 Fokuskan Alamat</button>
                <button type="button" class="map-btn btn-sync" onclick="syncMapToAddress()">🔄 Sinkronkan Alamat</button>
                <button type="button" class="map-btn btn-loc" onclick="getCurrentLocation()">📍 Lokasi Saya</button>
                
                <div class="layer-switch">
                    <button id="satBtn" class="layer-btn active" onclick="switchLayer('sat')">🛰️ Satelit</button>
                    <button id="terBtn" class="layer-btn" onclick="switchLayer('ter')">⛰️ Medan</button>
                    <button id="strBtn" class="layer-btn" onclick="switchLayer('str')">🗺️ Jalan</button>
                </div>
            </div>
            
            <div id="coordInfo" class="coord-info">Petunjuk: Gunakan "Fokuskan" untuk mencari teks alamat, atau "Sinkronkan" untuk mengambil alamat dari posisi marker.</div>
            
            <input type="hidden" id="inputLat">
            <input type="hidden" id="inputLng">
            
            <label class="label-text">Keterangan Tambahan:</label>
            <textarea id="inputKeterangan" rows="2"></textarea>
        </div>
        
        <div class="modal-buttons" style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
            <button class="btn btn-success" onclick="saveData()">✅ Simpan</button>
            <button class="btn btn-danger" onclick="closeModal()">❌ Batal</button>
        </div>
    </div>
</div>

<script>
    let dataStore = [];
    let editIndex = -1;
    let modalMap, modalMarker, currentLayer;
    let layers = {};

    // --- FUNGSI WHATSAPP LOCATION ---
    function handleWALocation() {
        const val = document.getElementById('waInput').value;
        const statusDiv = document.getElementById('coordInfo');
        
        // Regex untuk mencari koordinat dalam link Google Maps (biasa dikirim WA)
        const regex = /q=(-?\d+\.\d+),(-?\d+\.\d+)/;
        const match = val.match(regex);
        
        if (match) {
            const lat = parseFloat(match[1]);
            const lng = parseFloat(match[2]);
            updateMapPosition(lat, lng);
            statusDiv.innerHTML = "✅ Lokasi WhatsApp terdeteksi! Klik 'Sinkronkan' untuk isi alamat.";
            statusDiv.style.color = "#27ae60";
        }
    }

    // --- FUNGSI TOMBOL BARU: FOKUSKAN ALAMAT (TEKS -> PETA) ---
    async function focusAddressOnMap() {
        const addr = document.getElementById('inputAlamat').value;
        const statusDiv = document.getElementById('coordInfo');
        if (!addr) return alert("Ketik alamat dulu!");

        statusDiv.innerHTML = "🔍 Mencari posisi alamat di peta...";
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr + ", Jawa Timur")}&limit=1`);
            const data = await res.json();
            if (data.length > 0) {
                updateMapPosition(data[0].lat, data[0].lon);
                statusDiv.innerHTML = "✅ Peta difokuskan ke alamat tersebut.";
                statusDiv.style.color = "#3498db";
            } else {
                alert("Alamat tidak ditemukan!");
            }
        } catch (e) { alert("Gagal koneksi pencarian."); }
    }

    // --- FUNGSI TOMBOL LAMA: SINKRONKAN (PETA -> TEKS) ---
    async function syncMapToAddress() {
        const pos = modalMarker.getLatLng();
        const statusDiv = document.getElementById('coordInfo');
        statusDiv.innerHTML = "🔄 Mengambil alamat dari posisi marker...";
        
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`);
            const data = await res.json();
            if (data.display_name) {
                document.getElementById('inputAlamat').value = data.display_name;
                document.getElementById('inputLat').value = pos.lat;
                document.getElementById('inputLng').value = pos.lng;
                statusDiv.innerHTML = "✅ Alamat diperbarui sesuai posisi marker.";
                statusDiv.style.color = "#2ecc71";
            }
        } catch (e) { alert("Gagal sinkron alamat."); }
    }

    function updateMapPosition(lat, lng) {
        modalMap.setView([lat, lng], 17);
        modalMarker.setLatLng([lat, lng]);
        document.getElementById('inputLat').value = lat;
        document.getElementById('inputLng').value = lng;
    }

    // --- INISIALISASI PETA ---
    function initMap() {
        const start = [-7.776, 112.198];
        modalMap = L.map('modalMap').setView(start, 15);
        
        layers.sat = L.tileLayer('https://mt1.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20 });
        layers.ter = L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', { maxZoom: 20 });
        layers.str = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        
        layers.sat.addTo(modalMap);
        currentLayer = layers.sat;
        modalMarker = L.marker(start, { draggable: true }).addTo(modalMap);
    }

    function switchLayer(key) {
        modalMap.removeLayer(currentLayer);
        layers[key].addTo(modalMap);
        currentLayer = layers[key];
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(key + 'Btn').classList.add('active');
    }

    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                updateMapPosition(p.coords.latitude, p.coords.longitude);
                syncMapToAddress();
            });
        }
    }

    // --- SISTEM DATA (CRUD) ---
    function openAddModal() {
        editIndex = -1;
        document.getElementById('modalTitle').innerText = "➕ Tambah Data";
        document.getElementById('waInput').value = "";
        ['inputNama', 'inputAlamat', 'inputKeterangan', 'inputLat', 'inputLng'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('modal').style.display = 'block';
        setTimeout(() => modalMap.invalidateSize(), 200);
    }

    function openEditModal(idx) {
        editIndex = idx;
        const item = dataStore[idx];
        document.getElementById('modalTitle').innerText = "✏️ Edit Data";
        document.getElementById('inputNama').value = item.nama;
        document.getElementById('inputAlamat').value = item.alamat;
        document.getElementById('inputKeterangan').value = item.keterangan || '';
        updateMapPosition(item.lat, item.lng);
        document.getElementById('modal').style.display = 'block';
        setTimeout(() => modalMap.invalidateSize(), 200);
    }

    function saveData() {
        const item = {
            nama: document.getElementById('inputNama').value,
            alamat: document.getElementById('inputAlamat').value,
            keterangan: document.getElementById('inputKeterangan').value,
            lat: parseFloat(document.getElementById('inputLat').value),
            lng: parseFloat(document.getElementById('inputLng').value)
        };
        if (!item.nama || !item.lat) return alert("Lengkapi data!");
        if (editIndex === -1) dataStore.push(item); else dataStore[editIndex] = item;
        localStorage.setItem('sensusJatim', JSON.stringify(dataStore));
        closeModal(); renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = dataStore.filter(i => i.nama.toLowerCase().includes(term) || i.alamat.toLowerCase().includes(term));
        
        tbody.innerHTML = filtered.map((item, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td>${item.nama}</td>
                <td>${item.alamat}</td>
                <td>
                    <button class="btn btn-warning" style="padding:5px 10px" onclick="openEditModal(${dataStore.indexOf(item)})">✏️</button>
                    <button class="btn btn-info" style="padding:5px 10px" onclick="window.open('https://www.google.com/maps?q=${item.lat},${item.lng}')">🧭</button>
                    <button class="btn btn-danger" style="padding:5px 10px" onclick="deleteData(${dataStore.indexOf(item)})">🗑️</button>
                </td>
            </tr>`).join('');
    }

    function deleteData(idx) { if(confirm('Hapus?')) { dataStore.splice(idx,1); localStorage.setItem('sensusJatim', JSON.stringify(dataStore)); renderTable(); } }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function quickSearch() { renderTable(); }
    function exportData() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(dataStore)], {type:'application/json'}));
        a.download = 'sensus_jatim.json'; a.click();
    }
    function importData() {
        const inp = document.createElement('input'); inp.type = 'file';
        inp.onchange = e => {
            const r = new FileReader();
            r.onload = ev => { dataStore = JSON.parse(ev.target.result); renderTable(); };
            r.readAsText(e.target.files[0]);
        };
        inp.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('sensusJatim');
        if (saved) dataStore = JSON.parse(saved);
        renderTable();
        initMap();
    };
</script>
</body>
</html>
