<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sensus JATIM | Data Keluarga & Lokasi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            margin: 0; padding: 20px; min-height: 100vh;
        }
        .main-container {
            max-width: 1400px; margin: 0 auto; background: white;
            border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 20px;
        }
        h1 { margin: 0; color: #2c3e50; font-size: 24px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; font-size: 14px; }
        
        .button-panel { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; color: white; transition: 0.3s; }
        .btn-primary { background: #3498db; }
        .btn-success { background: #27ae60; }
        .btn-warning { background: #f39c12; }
        .btn-danger { background: #e74c3c; }

        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #e0e0e0; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #34495e; color: white; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 20px auto; padding: 20px; border-radius: 16px; width: 95%; max-width: 850px; }
        
        /* Bagian Anggota */
        .member-container { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px dashed #ccc; margin-bottom: 15px; }
        .member-item { display: flex; gap: 10px; margin-bottom: 8px; }
        .member-item input { margin: 0; flex: 1; }

        .map-modal-container { margin: 10px 0; border-radius: 12px; overflow: hidden; border: 2px solid #3498db; height: 350px; }
        #modalMap { height: 100%; width: 100%; }
        
        .map-control-buttons { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
        .map-btn { border: none; border-radius: 8px; padding: 10px 15px; cursor: pointer; font-weight: 600; font-size: 12px; color: white; }
        
        .layer-switch { display: flex; gap: 5px; margin-left: auto; background: #eee; padding: 4px; border-radius: 25px; }
        .layer-btn { background: transparent; color: #555; border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .layer-btn.active { background: #3498db; color: white; }
        
        .coord-info { font-size: 12px; color: #2c3e50; margin: 10px 0; padding: 12px; background: #fffde7; border-radius: 8px; border-left: 5px solid #fbc02d; line-height: 1.5; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .label-text { font-weight: 700; color: #2c3e50; margin-top: 10px; display: block; }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="main-container">
    <h1>🛰️ Sensus Keluarga JATIM</h1>
    <div class="subtitle">Sensus Penduduk & Lokasi Geografis</div>
    
    <div class="button-panel">
        <button class="btn btn-primary" onclick="openAddModal()">➕ Tambah Data Baru</button>
        <button class="btn btn-warning" onclick="exportData()">💾 Export JSON</button>
        <button class="btn btn-success" onclick="importData()">📂 Import JSON</button>
    </div>
    
    <div class="table-wrapper">
        <table>
            <thead><tr><th>No</th><th>Kepala Keluarga</th><th>Anggota</th><th>Alamat</th><th>Aksi</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin:0 0 15px 0">Form Input Data</h3>
        
        <label class="label-text">Nama Kepala Keluarga / Penanggung Jawab:</label>
        <input type="text" id="inputNama" placeholder="Masukkan nama utama...">

        <div class="member-container">
            <label class="label-text" style="margin-top:0">Daftar Anggota / Penghuni:</label>
            <div id="memberList">
                </div>
            <button type="button" class="btn btn-primary" style="padding:5px 12px; font-size:12px; margin-top:5px;" onclick="addMemberInput('')">＋ Tambah Anggota</button>
        </div>
        
        <label class="label-text">Alamat Lengkap:</label>
        <textarea id="inputAlamat" rows="2" placeholder="Contoh: Jl. Benteng Pancasila No.9, Mojokerto"></textarea>
        
        <div class="map-modal-container"><div id="modalMap"></div></div>
        
        <div class="map-control-buttons">
            <button type="button" class="map-btn" style="background:#3498db;" onclick="searchAddress()">🔍 Fokuskan Alamat</button>
            <button type="button" class="map-btn" style="background:#27ae60;" onclick="reverseGeocode()">🔄 Isi Alamat dari Peta</button>
            
            <div class="layer-switch">
                <button id="satBtn" class="layer-btn active" onclick="switchLayer('sat')">Satelit</button>
                <button id="terBtn" class="layer-btn" onclick="switchLayer('ter')">Medan</button>
                <button id="strBtn" class="layer-btn" onclick="switchLayer('str')">Jalan</button>
            </div>
        </div>
        
        <div id="coordInfo" class="coord-info">Ketik alamat lalu klik <b>Fokuskan</b>. Jika marker belum pas, geser marker merah di peta secara manual.</div>
        
        <input type="hidden" id="inputLat">
        <input type="hidden" id="inputLng">
        
        <label class="label-text">Keterangan:</label>
        <textarea id="inputKeterangan" rows="2"></textarea>
        
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button class="btn btn-success" onclick="saveData()">✅ Simpan</button>
            <button class="btn btn-danger" onclick="closeModal()">❌ Batal</button>
        </div>
    </div>
</div>

<script>
    let dataStore = [];
    let editIndex = -1;
    let modalMap, modalMarker, currentLayer;
    let layers = {};

    // FUNGSI MANAJEMEN ANGGOTA
    function addMemberInput(value = '') {
        const container = document.getElementById('memberList');
        const div = document.createElement('div');
        div.className = 'member-item';
        div.innerHTML = `
            <input type="text" class="member-name" value="${value}" placeholder="Nama Anggota">
            <button type="button" class="btn btn-danger" style="padding:5px 10px" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }

    function getMembers() {
        const inputs = document.querySelectorAll('.member-name');
        return Array.from(inputs).map(inp => inp.value).filter(v => v !== '');
    }

    // FUNGSI PENCARIAN ALAMAT (FIX)
    async function searchAddress() {
        const fullAddr = document.getElementById('inputAlamat').value.trim();
        const info = document.getElementById('coordInfo');
        if (!fullAddr) return alert("Isi alamat!");

        info.innerHTML = "🔍 Mencari...";
        
        const parts = fullAddr.split(',').map(p => p.trim());
        
        async function fetchLoc(q) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
                const d = await r.json();
                return d.length > 0 ? d[0] : null;
            } catch(e) { return null; }
        }

        let res = await fetchLoc(fullAddr);
        if (!res && parts.length > 1) res = await fetchLoc(parts.slice(1).join(', '));
        if (!res && parts.length > 2) res = await fetchLoc(parts.slice(-2).join(', '));

        if (res) {
            moveMarker(res.lat, res.lon);
            info.innerHTML = "✅ Ditemukan! Silakan sesuaikan posisi marker.";
        } else {
            alert("Alamat spesifik tidak ditemukan. Peta tidak bergerak. Mohon geser marker secara manual.");
            info.innerHTML = "❌ Tidak ditemukan. Geser marker manual.";
        }
    }

    function moveMarker(lat, lng) {
        lat = parseFloat(lat); lng = parseFloat(lng);
        modalMap.setView([lat, lng], 17);
        modalMarker.setLatLng([lat, lng]);
        document.getElementById('inputLat').value = lat;
        document.getElementById('inputLng').value = lng;
    }

    async function reverseGeocode() {
        const pos = modalMarker.getLatLng();
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`);
            const d = await r.json();
            if (d.display_name) document.getElementById('inputAlamat').value = d.display_name;
        } catch(e) {}
    }

    // MAP SETUP
    function initMap() {
        modalMap = L.map('modalMap').setView([-7.472, 112.438], 12);
        layers.sat = L.tileLayer('https://mt1.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20 });
        layers.ter = L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', { maxZoom: 20 });
        layers.str = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        layers.sat.addTo(modalMap);
        currentLayer = layers.sat;
        modalMarker = L.marker([-7.472, 112.438], { draggable: true }).addTo(modalMap);
        modalMarker.on('dragend', () => {
            const p = modalMarker.getLatLng();
            document.getElementById('inputLat').value = p.lat;
            document.getElementById('inputLng').value = p.lng;
        });
    }

    function switchLayer(key) {
        modalMap.removeLayer(currentLayer);
        layers[key].addTo(modalMap);
        currentLayer = layers[key];
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(key + 'Btn').classList.add('active');
    }

    // CRUD
    function openAddModal() {
        editIndex = -1;
        document.getElementById('memberList').innerHTML = '';
        ['inputNama', 'inputAlamat', 'inputKeterangan', 'inputLat', 'inputLng'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('modal').style.display = 'block';
        setTimeout(() => modalMap.invalidateSize(), 300);
    }

    function openEditModal(idx) {
        editIndex = idx;
        const item = dataStore[idx];
        document.getElementById('inputNama').value = item.nama;
        document.getElementById('inputAlamat').value = item.alamat;
        document.getElementById('inputKeterangan').value = item.keterangan || '';
        document.getElementById('memberList').innerHTML = '';
        if(item.members) item.members.forEach(m => addMemberInput(m));
        document.getElementById('modal').style.display = 'block';
        setTimeout(() => { modalMap.invalidateSize(); moveMarker(item.lat, item.lng); }, 300);
    }

    function saveData() {
        const item = {
            nama: document.getElementById('inputNama').value,
            members: getMembers(),
            alamat: document.getElementById('inputAlamat').value,
            keterangan: document.getElementById('inputKeterangan').value,
            lat: document.getElementById('inputLat').value,
            lng: document.getElementById('inputLng').value
        };
        if(!item.nama || !item.lat) return alert("Nama dan Lokasi Peta wajib!");
        if(editIndex === -1) dataStore.push(item); else dataStore[editIndex] = item;
        localStorage.setItem('sensusJatim', JSON.stringify(dataStore));
        closeModal(); renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = dataStore.map((item, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td><b>${item.nama}</b></td>
                <td>${item.members ? item.members.join(', ') : '-'}</td>
                <td style="font-size:12px">${item.alamat}</td>
                <td>
                    <button class="btn btn-warning" style="padding:5px 8px" onclick="openEditModal(${idx})">✏️</button>
                    <button class="btn btn-danger" style="padding:5px 8px" onclick="deleteData(${idx})">🗑️</button>
                </td>
            </tr>`).join('');
    }

    function deleteData(idx) { if(confirm('Hapus?')) { dataStore.splice(idx,1); localStorage.setItem('sensusJatim', JSON.stringify(dataStore)); renderTable(); } }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function exportData() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(dataStore)], {type:'application/json'}));
        a.download = 'data_sensus.json'; a.click();
    }
    function importData() {
        const inp = document.createElement('input'); inp.type = 'file';
        inp.onchange = e => {
            const r = new FileReader();
            r.onload = ev => { dataStore = JSON.parse(ev.target.result); renderTable(); };
            r.readAsText(e.target.files[0]);
        };
        inp.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('sensusJatim');
        if(saved) dataStore = JSON.parse(saved);
        renderTable();
        initMap();
    };
</script>
</body>
</html>
